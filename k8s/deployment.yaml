apiVersion: apps/v1
kind: Deployment
metadata:
  name: cicd-kubernetes-pipeline
  namespace: cicd-demo
  labels:
    app.kubernetes.io/name: cicd-kubernetes-pipeline
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: sre-portfolio
spec:
  replicas: 2
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 120
  selector:
    matchLabels:
      app.kubernetes.io/name: cicd-kubernetes-pipeline
      app.kubernetes.io/component: web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cicd-kubernetes-pipeline
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: sre-portfolio
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/healthz"
        prometheus.io/port: "8080"
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: ghcr.io/mahesh-yelamarthy/cicd-kubernetes-pipeline:replace-with-git-sha
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
